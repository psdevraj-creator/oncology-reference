# Cloud Run service configuration
# Deploy with: gcloud run services replace deployment/cloudrun.yaml
#
# Or deploy directly:
#   gcloud run deploy oncology-handbook \
#     --source . \
#     --region us-central1 \
#     --memory 512Mi \
#     --cpu 2 \
#     --min-instances 1 \
#     --max-instances 10 \
#     --concurrency 80 \
#     --timeout 300

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: oncology-handbook
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/PROJECT_ID/oncology-handbook
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 512Mi
            cpu: 2
          requests:
            memory: 384Mi
            cpu: 1
        startupProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 40
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 60
