steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/oncology-handbook'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/oncology-handbook'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'oncology-handbook'
      - '--image=gcr.io/$PROJECT_ID/oncology-handbook'
      - '--platform=managed'
      - '--region=europe-west2'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=300'
      - '--concurrency=80'

images:
  - 'gcr.io/$PROJECT_ID/oncology-handbook'

options:
  logging: CLOUD_LOGGING_ONLY
